<nav class="navbar">
  <div class="navbar__inner">
    <a routerLink="/" class="navbar__logo">
      <span class="navbar__logo-text">Mangarg</span>
    </a>

    <div class="navbar__links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="navbar__link">
        {{ t().nav.home }}
      </a>
      <a routerLink="/library" routerLinkActive="active" class="navbar__link">
        {{ t().nav.library }}
        @if (libraryCount() > 0) {
          <span class="navbar__badge">{{ libraryCount() }}</span>
        }
      </a>
      <a routerLink="/updates" routerLinkActive="active" class="navbar__link">
        {{ t().nav.updates }}
      </a>
      <a routerLink="/history" routerLinkActive="active" class="navbar__link">
        {{ t().nav.history }}
      </a>
      <a routerLink="/browse" routerLinkActive="active" class="navbar__link">
        {{ t().nav.browse }}
      </a>
      <a routerLink="/download" routerLinkActive="active" class="navbar__link navbar__link--download">
        {{ t().nav.download }}
      </a>
    </div>

    <div class="navbar__controls">
      <select
        class="navbar__lang-select"
        [value]="lang()"
        (change)="onLangChange($event)"
        aria-label="Language"
      >
        <option value="es">ES</option>
        <option value="en">EN</option>
      </select>

      <button
        class="navbar__theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="isDark() ? t().nav.lightMode : t().nav.darkMode"
      >
        @if (isDark()) {
          Light
        } @else {
          Dark
        }
      </button>
    </div>
  </div>
</nav>
