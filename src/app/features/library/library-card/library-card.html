<div class="lib-card" [class.list-mode]="viewMode() === 'list'" (click)="onCardClick()">
  <div class="lib-card__image">
    <img [src]="entry().image_url" [alt]="displayTitle()" loading="lazy" />
    <span class="lib-card__category-badge">{{ categoryLabel(entry().category) }}</span>
  </div>

  <div class="lib-card__body">
    <h3 class="lib-card__title">{{ displayTitle() }}</h3>

    <div class="lib-card__meta">
      @if (entry().score) {
        <span class="lib-card__score">{{ entry().score }}</span>
      }
      <span class="lib-card__status">{{ entry().status }}</span>
    </div>

    <div class="lib-card__actions">
      <div class="lib-card__category-wrapper">
        <button class="lib-card__action-btn" (click)="toggleCategoryMenu($event)">
          {{ categoryLabel(entry().category) }} ▾
        </button>
        @if (showCategoryMenu) {
          <div class="lib-card__category-menu">
            @for (cat of categories; track cat) {
              <button
                class="lib-card__category-option"
                [class.active]="cat === entry().category"
                (click)="onCategoryChange(cat); $event.stopPropagation()"
              >
                {{ categoryLabel(cat) }}
              </button>
            }
          </div>
        }
      </div>
      <button class="lib-card__remove-btn" (click)="onRemove($event)">X</button>
    </div>
  </div>
</div>
