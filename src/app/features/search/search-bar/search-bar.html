<div class="search-bar">
  <div class="search-bar__input-wrapper">
    <span class="search-bar__icon">&#x1F50D;</span>
    <input
      [formControl]="searchControl"
      type="text"
      [placeholder]="t().search.placeholder"
      class="search-bar__input"
      [attr.aria-label]="t().search.title"
    />
    @if (searchControl.value) {
      <button class="search-bar__clear" (click)="clearSearch()" [attr.aria-label]="t().search.clear">
        &#x2715;
      </button>
    }
    @if (loading()) {
      <mt-loading-spinner size="sm" />
    }
  </div>
  @if (error()) {
    <p class="search-bar__error">{{ error() }}</p>
  }
</div>
