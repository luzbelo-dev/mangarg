[build]
  command = "npm run build"
  publish = "dist/manga-tracker/browser"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/download/mi-manga-dinamita.apk"
  to = "https://github.com/alearenass090/mi-manga-dinamita/releases/download/latest/mi-manga-dinamita.apk"
  status = 302
  force = true

[[redirects]]
  from = "/download/Mi.Manga.Dinamita.exe"
  to = "https://github.com/alearenass090/mi-manga-dinamita/releases/download/v1.0.0/Mi.Manga.Dinamita.1.0.0.exe"
  status = 302
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
