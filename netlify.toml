[build]
  command = "npm run build"
  publish = "dist/manga-tracker/browser"
  functions = "netlify/functions"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# La APK consulta este archivo para detectar actualizaciones: siempre fresco.
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/download/mangarg.apk"
  to = "https://github.com/alearenass090/mangarg/releases/download/latest/mangarg.apk"
  status = 302
  force = true

[[redirects]]
  from = "/download/Mangarg.exe"
  to = "https://github.com/alearenass090/mangarg/releases/download/latest/Mangarg.exe"
  status = 302
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
