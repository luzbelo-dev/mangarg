name: Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular
        run: npx ng build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app icons
        run: npx capacitor-assets generate --android

      - name: Fix Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            sed -i 's|android:theme="@style/AppTheme"|android:usesCleartextTraffic="true"\n        android:theme="@style/AppTheme"|' "$MANIFEST"
          fi
          if ! grep -q 'ACCESS_NETWORK_STATE' "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />|' "$MANIFEST"
          fi

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk mangarg.apk

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release with APK
        run: |
          gh release create latest mangarg.apk \
            --title "Mangarg - Ultima version" \
            --notes "APK generado automaticamente. Descarga mangarg.apk e instalalo en tu Android." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangarg-apk
          path: mangarg.apk
