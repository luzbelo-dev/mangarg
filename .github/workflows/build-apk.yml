name: Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular
        run: npx ng build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app icons
        run: npx capacitor-assets generate --android

      - name: Fix Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            sed -i 's|android:theme="@style/AppTheme"|android:usesCleartextTraffic="true"\n        android:theme="@style/AppTheme"|' "$MANIFEST"
          fi
          if ! grep -q 'ACCESS_NETWORK_STATE' "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />|' "$MANIFEST"
          fi

      - name: Build APK (release)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # normalizar por si el secret quedo con salto de linea al final
          KS_PASS=$(printf '%s' "$KEYSTORE_PASSWORD" | tr -d '\r\n')
          KS_ALIAS=$(printf '%s' "$KEY_ALIAS" | tr -d '\r\n')
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \r\n' | base64 -d > release.jks
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED" mangarg-aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks release.jks \
            --ks-key-alias "$KS_ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --out mangarg.apk mangarg-aligned.apk
          "$BUILD_TOOLS/apksigner" verify --print-certs mangarg.apk | head -4
          rm -f release.jks mangarg-aligned.apk

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release with APK
        run: |
          gh release create latest mangarg.apk \
            --title "Mangarg - Ultima version" \
            --notes "APK generado automaticamente. Descarga mangarg.apk e instalalo en tu Android." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangarg-apk
          path: mangarg.apk
