name: Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npx ng build

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk mi-manga-dinamita.apk

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Mi Manga Dinamita - Ultima version
          body: |
            APK generado automaticamente desde el ultimo push a master.
            Descarga el archivo mi-manga-dinamita.apk e instalalo en tu Android.
          files: mi-manga-dinamita.apk
          prerelease: false
          make_latest: true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-manga-dinamita-apk
          path: mi-manga-dinamita.apk
